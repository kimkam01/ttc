<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>經典文言文字義大挑戰</title>
    <style>
        :root {
            --primary: #1e4b61; /* 深邃靛藍 */
            --bg: #f2f5f7; /* 淺灰藍背景 */
            --text: #333;
            --btn-hover: #143647;
            --accent: #a63a43; /* 絳紅 */
        }
        body {
            font-family: "Microsoft JhengHei", "PingFang TC", serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        #game-container {
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 750px; /* 加寬一點容納選單 */
            padding: 35px;
            text-align: center;
            border-top: 8px solid var(--primary);
            position: relative;
        }
        h1 { color: var(--primary); margin-bottom: 5px; font-size: 28px;}
        .subtitle { color: #666; margin-bottom: 25px; font-size: 15px; font-weight: bold;}
        
        /* 首頁選單網格排版 */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }
        /* 標題分類 */
        .category-title {
            grid-column: span 2;
            text-align: left;
            font-size: 16px;
            color: var(--accent);
            border-bottom: 2px solid #eee;
            padding-bottom: 5px;
            margin-top: 10px;
            font-weight: bold;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            transition: 0.2s;
            width: 100%;
        }
        button:hover { background-color: var(--btn-hover); transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.15);}
        .btn-full { grid-column: span 2; background-color: var(--accent); padding: 16px; font-size: 18px;}
        .btn-full:hover { background-color: #8c2e36; }
        
        .hidden { display: none !important; }
        
        /* 遊戲畫面專用 */
        .info-bar { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 20px; color: var(--primary); border-bottom: 2px solid #eee; padding-bottom: 10px; font-size: 18px;}
        .quote-box { background: #fdfaf3; padding: 25px; border-radius: 10px; border-left: 6px solid var(--accent); margin: 20px 0; font-size: 22px; letter-spacing: 2px; font-weight: bold; color: #444; line-height: 1.5;}
        .word-highlight { color: var(--accent); font-size: 1.3em; border-bottom: 3px dashed var(--accent); padding: 0 4px;}
        
        /* 選擇題與填空題 */
        #mcq-container button { width: 100%; text-align: left; padding: 18px; margin: 6px 0; background-color: #f4f6f7; color: #333; font-weight: bold; border: 2px solid transparent; font-size: 18px;}
        #mcq-container button:hover { background-color: #e6ebed; border-color: var(--primary); color: var(--primary);}
        
        input[type="text"] { width: 85%; padding: 18px; font-size: 20px; border: 2px solid #ccc; border-radius: 8px; margin-bottom: 15px; text-align: center; font-weight: bold;}
        input[type="text"]:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 8px rgba(43, 92, 115, 0.3);}
        
        #feedback { font-size: 20px; font-weight: bold; margin-top: 20px; min-height: 50px; transition: 0.3s; line-height: 1.6;}
        .correct { color: #28a745; }
        .wrong { color: #dc3545; }
        
        /* 計時器條 */
        #timer-bar { height: 10px; background-color: #eee; border-radius: 5px; overflow: hidden; margin-top: 15px; }
        #timer-fill { height: 100%; background-color: #28a745; width: 100%; transition: width 0.1s linear, background-color 0.3s; }
        
        /* 錯題本 */
        #mistakes-log { text-align: left; background: #fff3cd; padding: 20px; border-radius: 10px; font-size: 16px; margin-top: 25px; color: #856404; display: none; line-height: 1.8; border: 1px solid #ffeeba;}
    </style>
</head>
<body>

<div id="game-container">

            <button onclick="selectChapter('7')">李白【月下獨酌】 (14題)</button>
            <button onclick="selectChapter('8')">李清照【聲聲慢】 (7題)</button>
            <button onclick="selectChapter('9')">蘇軾【念奴嬌】 (9題)</button>
            <button onclick="selectChapter('10')" style="grid-column: span 2;">辛棄疾【青玉案·元夕】 (13題)</button>
            
            <button class="btn-full" onclick="selectChapter('ALL')">🔥 綜合終極全測 (隨機抽考10題) 🔥</button>
        </div>
    </div>

    <!-- 2. 選擇難度模式 -->
    <div id="screen-mode" class="hidden">
        <h1 id="selected-chapter-title"></h1>
        <h3 style="margin-top: 30px;">請選擇測驗難度：</h3>
        <button onclick="startGame('mcq')" style="padding: 20px;">🌟 書僮模式 (三選一)<br><span style="font-size:14px; font-weight:normal;">(答對基本分 3 分)</span></button><br>
        <button onclick="startGame('fill')" style="padding: 20px;">🔥 大師模式 (填空題)<br><span style="font-size:14px; font-weight:normal;">(答對基本分 5 分)</span></button>
        
        <p style="color:var(--accent); margin-top: 25px; font-size: 15px; font-weight:bold;">⚡ 速度加成：3秒內作答 +2分！6秒內作答 +1分！</p>
        <button onclick="showScreen('screen-home')" style="background-color: #ddd; color: #555; margin-top: 20px; width: 60%;">返回上一步</button>
    </div>

    <!-- 3. 遊戲進行中 -->
    <div id="screen-game" class="hidden">
        <div class="info-bar">
            <span id="ui-question-num">第 1 題</span>
            <span id="ui-score">分數：0</span>
        </div>
        
        <div id="timer-bar"><div id="timer-fill"></div></div>
        
        <div class="quote-box">
            <span id="ui-quote"></span>
        </div>
        <p style="font-size: 20px; font-weight:bold;">請問「<span id="ui-word" class="word-highlight"></span>」的注釋為何？</p>

        <!-- 選擇題區塊 -->
        <div id="mcq-container" class="hidden"></div>

        <!-- 填空題區塊 -->
        <div id="fill-container" class="hidden">
            <input type="text" id="ui-fill-input" placeholder="請輸入注釋..." onkeypress="handleEnter(event)" autocomplete="off">
            <br>
            <button onclick="checkFillAnswer()" style="width: 85%;">送出答案 (Enter)</button>
        </div>

        <div id="feedback"></div>
    </div>

    <!-- 4. 遊戲結果 -->
    <div id="screen-result" class="hidden">
        <h1>🎉 測驗結束 🎉</h1>
        <h2 id="final-score" style="font-size: 45px; color: var(--accent); margin: 15px 0;"></h2>
        <h3 id="final-rank" style="color: #444; font-size: 22px;"></h3>
        <div id="mistakes-log"></div>
        <button class="btn-full" onclick="location.reload()" style="margin-top: 30px; font-size: 20px; padding: 15px;">回主選單 🔄</button>
    </div>
</div>

            { quote: "左右皆靡", word: "靡", answers: ["倒下", "退卻"] },
            { quote: "於是秦王不懌", word: "懌", answers: ["高興", "喜悅"] },
            { quote: "請以趙十五城為秦王壽", word: "壽", answers: ["祝壽", "作動詞用"] },
            { quote: "且相如素賤人", word: "素", answers: ["向來", "本來", "一向"] },
            { quote: "臣所以去親戚而事君者", word: "去", answers: ["離開", "遠離"] },
            { quote: "公之視廉將軍孰與秦王", word: "孰與", answers: ["比對方怎麼樣", "與...相比", "用於比照"] },
            { quote: "相如雖駑", word: "駑", answers: ["劣馬", "喻愚鈍無能", "愚鈍無能"] },
            { quote: "顧吾念之", word: "顧", answers: ["只是", "不過", "表示轉折"] },
            { quote: "為刎頸之交", word: "刎頸之交", answers: ["誓同生死的朋友", "同生共死的朋友"] }
        ]}
    };

    // 建立選擇題用的干擾選項庫
    let allPossibleAnswers = [];
    Object.values(GAME_DATA).forEach(cat => {
        cat.questions.forEach(q => allPossibleAnswers.push(q.answers[0]));
    });
    allPossibleAnswers = [...new Set(allPossibleAnswers)]; 

    // --- 遊戲狀態變數 ---
    let selectedQuestions = [];
    let currentQIndex = 0;
    let score = 0;
    let mode = 'mcq';
    let baseScore = 3;
    let maxQuestions = 10; 
    let currentStartTime = 0;
    let timerInterval = null;
    let isAnswering = false;
    let mistakes = [];

    // --- 介面切換 ---
    function showScreen(screenId) {
        document.querySelectorAll('#game-container > div').forEach(div => div.classList.add('hidden'));
        document.getElementById(screenId).classList.remove('hidden');
    }

    // --- 流程控制 ---
    function selectChapter(chapId) {
        selectedQuestions = [];
        let title = "";
        if(chapId === 'ALL') {
            title = "綜合終極全測 (隨機抽考)";
            Object.values(GAME_DATA).forEach(cat => selectedQuestions = selectedQuestions.concat(cat.questions));
        } else {
            title = "單元：" + GAME_DATA[chapId].name;
            selectedQuestions = [...GAME_DATA[chapId].questions];
        }
        document.getElementById('selected-chapter-title').innerText = title;
        // 打亂題目順序
        selectedQuestions.sort(() => Math.random() - 0.5);
        showScreen('screen-mode');
    }

    function startGame(selectedMode) {
        mode = selectedMode;
        baseScore = mode === 'mcq' ? 3 : 5;
        score = 0;
        currentQIndex = 0;
        mistakes = [];
        // 每次玩最多測驗 10 題
        maxQuestions = Math.min(10, selectedQuestions.length); 
        
        showScreen('screen-game');
        loadQuestion();
    }

    function loadQuestion() {
        if(currentQIndex >= maxQuestions) {
            endGame();
            return;
        }

        isAnswering = false;
        let q = selectedQuestions[currentQIndex];
        
        document.getElementById('ui-question-num').innerText = `第 ${currentQIndex + 1} / ${maxQuestions} 題`;
        document.getElementById('ui-score').innerText = `目前總分：${score}`;
        
        // 將原句中的考核字用高亮標示
        let highlightedQuote = q.quote.replace(new RegExp(q.word, 'g'), `<span class="word-highlight">${q.word}</span>`);
        document.getElementById('ui-quote').innerHTML = highlightedQuote;
        
        document.getElementById('ui-word').innerText = q.word;
        document.getElementById('feedback').innerText = "";
        
        document.getElementById('mcq-container').classList.add('hidden');
        document.getElementById('fill-container').classList.add('hidden');

        if(mode === 'mcq') {
            setupMCQ(q);
        } else {
            setupFill(q);
        }

        startTimer();
    }

    function setupMCQ(q) {
        let container = document.getElementById('mcq-container');
        container.innerHTML = "";
        container.classList.remove('hidden');

        let options = [q.answers[0]]; // 第一順位正確選項
        while(options.length < 3) {
            let randAns = allPossibleAnswers[Math.floor(Math.random() * allPossibleAnswers.length)];
            // 確保干擾選項沒有重複，且不是另一個容錯答案
            if(!options.includes(randAns) && !q.answers.includes(randAns)) {
                options.push(randAns);
            }
        }
        options.sort(() => Math.random() - 0.5); 

        options.forEach((opt, index) => {
            let btn = document.createElement('button');
            btn.innerText = `${['(A)', '(B)', '(C)'][index]} ${opt}`;
            btn.onclick = () => processAnswer(opt === q.answers[0], opt, q.answers[0]);
            container.appendChild(btn);
        });
    }

    function setupFill(q) {
        let container = document.getElementById('fill-container');
        container.classList.remove('hidden');
        let input = document.getElementById('ui-fill-input');
        input.value = "";
        input.focus();
    }

    function handleEnter(e) {
        if(e.key === 'Enter') checkFillAnswer();
    }

    function checkFillAnswer() {
        if(isAnswering) return;
        let userInput = document.getElementById('ui-fill-input').value.trim();
        if(userInput === "") return;
        
        let q = selectedQuestions[currentQIndex];
        // 模糊判斷：輸入字串包含在正確答案中，或完全相等
        let isCorrect = q.answers.some(ans => userInput === ans || (userInput.length > 0 && ans.includes(userInput)));
        processAnswer(isCorrect, userInput, q.answers[0]);
    }

    // --- 計時與給分 ---
    function startTimer() {
        currentStartTime = Date.now();
        let fill = document.getElementById('timer-fill');
        fill.style.width = '100%';
        fill.style.backgroundColor = '#28a745';
        
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if(isAnswering) return;
            let elapsed = (Date.now() - currentStartTime) / 1000;
            let percent = Math.max(0, 100 - (elapsed / 10 * 100)); // 10秒基準
            fill.style.width = percent + '%';
            
            if(elapsed > 3 && elapsed <= 6) fill.style.backgroundColor = '#ffc107'; 
            if(elapsed > 6) fill.style.backgroundColor = '#dc3545'; 
            
        }, 50);
    }

    function processAnswer(isCorrect, userAnswer, correctAns) {
        if(isAnswering) return;
        isAnswering = true;
        clearInterval(timerInterval);

        let elapsed = (Date.now() - currentStartTime) / 1000;
        let timeBonus = 0;
        let fbDiv = document.getElementById('feedback');
        
        if(isCorrect) {
            if(elapsed <= 3.0) timeBonus = 2;
            else if (elapsed <= 6.0) timeBonus = 1;
            
            let roundScore = baseScore + timeBonus;
            score += roundScore;
            
            fbDiv.className = "correct";
            fbDiv.innerHTML = `✅ 答對了！+${baseScore}分 <br><small style="color:#666;">⏱️ 反應時間：${elapsed.toFixed(1)}秒 (手速加分 +${timeBonus})</small>`;
        } else {
            let q = selectedQuestions[currentQIndex];
            mistakes.push(`「<span style="color:var(--accent); font-weight:bold;">${q.word}</span>」應解釋為：<b>${correctAns}</b> <br><small style="color:#888;">(出自：${q.quote})</small>`);
            fbDiv.className = "wrong";
            fbDiv.innerHTML = `❌ 答錯了！<br>正確答案應為：【${correctAns}】`;
        }

        document.getElementById('ui-score').innerText = `目前總分：${score}`;

        setTimeout(() => {
            currentQIndex++;
            loadQuestion();
        }, 2200); // 停留2.2秒讓玩家看清楚
    }

    function endGame() {
        showScreen('screen-result');
        let maxPossible = maxQuestions * (baseScore + 2);
        
        document.getElementById('final-score').innerText = `${score} / ${maxPossible} 分`;
        
        let rankText = "";
        let ratio = score / maxPossible;
        if(ratio === 1) rankText = "🌟 一代宗師！完美無瑕的國文大師！";
        else if(ratio >= 0.8) rankText = "👍 舉一反三！對古文有極高的敏銳度！";
        else if(ratio >= 0.5) rankText = "📚 溫故知新！基礎不錯，再接再厲！";
        else rankText = "🐢 欲速則不達！多看幾次注釋再來挑戰吧！";
        
        document.getElementById('final-rank').innerText = rankText;

        // 顯示錯題本
        let mistakeDiv = document.getElementById('mistakes-log');
        if(mistakes.length > 0) {
            mistakeDiv.style.display = "block";
            mistakeDiv.innerHTML = "<b style='font-size:18px;'>📝 錯題複習清單：</b><hr style='border:0; border-top:1px dashed #ccc; margin:10px 0;'><ul style='padding-left: 20px; margin-bottom:0;'>" + mistakes.map(m => `<li style="margin-bottom:8px;">${m}</li>`).join("") + "</ul>";
        } else {
            mistakeDiv.style.display = "none";
        }
    }
</script>
